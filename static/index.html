<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Generator — one brief, three voices</title>
<style>
  :root {
    --bg: #f6fbf9;
    --surface: #ffffff;
    --ink: #0f1f1a;
    --muted: #5b6f68;
    --line: #e3efe9;
    --mint: #10b981;
    --mint-deep: #059669;
    --mint-soft: #d1fae5;
    --teal: #14b8a6;
    --radius: 18px;
    --shadow: 0 1px 2px rgba(16,40,33,.04), 0 12px 32px -12px rgba(16,40,33,.12);
    --font: "Inter", "Helvetica Neue", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    background-image:
      radial-gradient(900px 500px at 80% -8%, rgba(20,184,166,.10), transparent 60%),
      radial-gradient(700px 450px at -5% 10%, rgba(16,185,129,.10), transparent 55%);
    color: var(--ink); line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  header { padding: 64px 0 30px; text-align: center; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 600; letter-spacing: .02em;
    color: var(--mint-deep); background: var(--mint-soft);
    padding: 6px 14px; border-radius: 999px; margin-bottom: 22px;
  }
  .pill::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--mint); }
  h1 {
    font-size: clamp(34px, 5.5vw, 60px);
    font-weight: 800; line-height: 1.05; letter-spacing: -0.03em;
  }
  h1 .grad {
    background: linear-gradient(100deg, var(--mint) 0%, var(--teal) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub {
    margin: 20px auto 0; font-size: 18px; color: var(--muted); max-width: 54ch;
  }

  .panel {
    margin: 38px auto 8px; max-width: 760px; background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 26px; box-shadow: var(--shadow);
  }
  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 680px) { .fields { grid-template-columns: 1fr; } }
  label {
    display: block; font-size: 12px; font-weight: 600; letter-spacing: .01em;
    color: var(--muted); margin-bottom: 7px;
  }
  input {
    width: 100%; padding: 13px 15px; font-size: 15px; font-family: var(--font);
    background: var(--bg); border: 1.5px solid var(--line);
    border-radius: 11px; color: var(--ink); transition: border-color .15s, box-shadow .15s;
  }
  input::placeholder { color: #9bb0a8; }
  input:focus { outline: none; border-color: var(--mint); box-shadow: 0 0 0 3px rgba(16,185,129,.15); }
  .actions { margin-top: 20px; display: flex; align-items: center; gap: 16px; }
  button {
    font-family: var(--font); font-size: 15px; font-weight: 600;
    color: #fff; border: none; border-radius: 11px; padding: 13px 28px; cursor: pointer;
    background: linear-gradient(100deg, var(--mint) 0%, var(--mint-deep) 100%);
    box-shadow: 0 6px 16px -6px rgba(16,185,129,.6); transition: transform .12s, box-shadow .2s, filter .2s;
  }
  button:hover:not(:disabled) { filter: brightness(1.05); box-shadow: 0 10px 22px -8px rgba(16,185,129,.7); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: .55; cursor: not-allowed; box-shadow:none; }
  .status { font-size: 13px; color: var(--muted); display: inline-flex; align-items: center; }

  .dots span {
    display: inline-block; width: 6px; height: 6px; margin-left: 4px;
    background: var(--mint); border-radius: 50%;
    animation: bounce 1.1s infinite ease-in-out both;
  }
  .dots span:nth-child(2) { animation-delay: .16s; }
  .dots span:nth-child(3) { animation-delay: .32s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(.4); opacity:.4; } 40% { transform: scale(1); opacity:1; } }

  .results { margin: 30px 0 70px; display: grid; gap: 20px; grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 900px) { .results { grid-template-columns: 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow);
    opacity: 0; transform: translateY(16px); animation: rise .5s forwards;
  }
  .card:nth-child(2) { animation-delay: .12s; }
  .card:nth-child(3) { animation-delay: .24s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  .card-head { display: flex; align-items: center; gap: 11px; margin-bottom: 18px; }
  .badge {
    width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
    display: grid; place-items: center; color: #fff;
  }
  .badge svg { width: 20px; height: 20px; }
  .plat { font-weight: 700; font-size: 16px; }
  .plat small { display: block; font-weight: 500; font-size: 11px; color: var(--mint-deep); letter-spacing: .03em; }
  .field-label {
    font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); margin: 15px 0 5px;
  }
  .field-label:first-of-type { margin-top: 0; }
  .body-text { font-size: 14.5px; color: #1e3329; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .tag {
    font-size: 12px; font-weight: 500; background: var(--mint-soft);
    border-radius: 999px; padding: 4px 11px; color: var(--mint-deep);
  }
  .cta-line {
    font-weight: 600; font-size: 14px; color: var(--ink);
    background: linear-gradient(100deg, rgba(16,185,129,.10), rgba(20,184,166,.06));
    border-left: 3px solid var(--mint); padding: 9px 13px; border-radius: 0 9px 9px 0;
  }
  .hook { font-size: 19px; font-weight: 600; line-height: 1.35; color: #14241d; }
  .error {
    background: #fff3f1; border: 1px solid #f4b8ac; color: #c0392b;
    border-radius: 12px; padding: 14px 16px; margin-top: 22px; font-size: 14px;
  }
  footer {
    border-top: 1px solid var(--line); padding: 26px 0 50px;
    font-size: 12.5px; color: var(--muted); text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="pill">AI Multi-Platform Ad Generator</div>
    <h1>One brief, <span class="grad">three voices</span>.</h1>
    <p class="sub">Type in a business and what it sells. Get tailored ad copy for Instagram, Facebook, and TikTok — each written in its own tone.</p>
  </header>

  <div class="panel">
    <div class="fields">
      <div>
        <label for="business">Business name</label>
        <input id="business" type="text" placeholder="Bean &amp; Brew" autocomplete="off">
      </div>
      <div>
        <label for="product">Product or service</label>
        <input id="product" type="text" placeholder="specialty coffee and pastries" autocomplete="off">
      </div>
    </div>
    <div class="actions">
      <button id="go">Generate ads</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="results" id="results"></div>

  <footer>Built with FastAPI &amp; Claude · every response validated before display</footer>
</div>

<script>
  const ICONS = {
    instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',
    facebook: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12z"/></svg>',
    tiktok: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.3 2.1 1.5 3.6 3.5 3.9V9c-1.3 0-2.5-.4-3.5-1.1v6.6c0 3.3-2.4 5.5-5.4 5.5A5.4 5.4 0 0 1 5.7 14c0-3.2 2.8-5.6 6.2-5v2.4c-.4-.1-.8-.2-1.2-.2-1.6 0-2.8 1.2-2.8 2.8 0 1.6 1.2 2.8 2.7 2.8 1.5 0 2.6-1.1 2.6-2.7V3h3.3z"/></svg>'
  };
  const COLORS = {
    instagram: 'linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366)',
    facebook: '#1877f2',
    tiktok: '#0f1f1a'
  };
  const SUB = { instagram: 'Inspire', facebook: 'Convince', tiktok: 'Hook' };

  const $ = (id) => document.getElementById(id);
  const results = $('results'), statusEl = $('status'), btn = $('go');

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function card(platform, inner) {
    return `<div class="card">
      <div class="card-head">
        <div class="badge" style="background:${COLORS[platform]}">${ICONS[platform]}</div>
        <div class="plat">${platform[0].toUpperCase()+platform.slice(1)}<small>${SUB[platform]}</small></div>
      </div>${inner}</div>`;
  }

  function render(data) {
    const ig = data.instagram, fb = data.facebook, tt = data.tiktok;
    results.innerHTML =
      card('instagram', `
        <div class="field-label">Caption</div>
        <div class="body-text">${esc(ig.caption)}</div>
        <div class="field-label">Hashtags</div>
        <div class="tags">${ig.hashtags.map(t => `<span class="tag">#${esc(t.replace(/^#/,''))}</span>`).join('')}</div>`)
      + card('facebook', `
        <div class="field-label">Ad copy</div>
        <div class="body-text">${esc(fb.text)}</div>
        <div class="field-label">Call to action</div>
        <div class="cta-line">${esc(fb.cta)}</div>`)
      + card('tiktok', `
        <div class="field-label">Hook</div>
        <div class="hook">${esc(tt.hook)}</div>`);
  }

  async function generate() {
    const business = $('business').value.trim();
    const product = $('product').value.trim();
    if (!business || !product) {
      statusEl.textContent = 'Fill in both fields to continue.';
      return;
    }
    btn.disabled = true;
    results.innerHTML = '';
    statusEl.innerHTML = 'Writing in three voices <span class="dots"><span></span><span></span><span></span></span>';
    try {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ business, product })
      });
      if (!res.ok) {
        const detail = res.status === 422
          ? 'Both fields are required.'
          : 'Could not generate valid content. Please try again.';
        results.innerHTML = `<div class="error" style="grid-column:1/-1">${detail}</div>`;
        statusEl.textContent = '';
        return;
      }
      const data = await res.json();
      render(data);
      statusEl.textContent = '';
    } catch (e) {
      results.innerHTML = `<div class="error" style="grid-column:1/-1">Network error. Check your connection and try again.</div>`;
      statusEl.textContent = '';
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', generate);
  ['business','product'].forEach(id =>
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') generate(); })
  );
</script>
</body>
</html>
